site_name: liveplots
site_description: Real-time live plot server using XML-RPC and Gnuplot
site_url: https://fccoelho.github.io/liveplots
repo_url: https://github.com/fccoelho/liveplots
repo_name: fccoelho/liveplots

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.code.select
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorial: tutorial.md
  - API Reference:
      - server: api/server.md
      - plotter: api/plotter.md
      - monitor: api/monitor.md
